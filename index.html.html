<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlickDrop — Download Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030d1a;
  --surface: #071628;
  --card-bg: #0a1d35;
  --border: rgba(100,180,255,0.12);
  --blue-1: #00b4ff;
  --blue-2: #0077cc;
  --blue-3: #38d9ff;
  --blue-glow: rgba(0,180,255,0.3);
  --blue-soft: rgba(56,217,255,0.08);
  --text: #dff0ff;
  --muted: #5a8aaa;
  --white: #ffffff;
  --gold: #ffd166;
  --green: #06d6a0;
  --red: #ef233c;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 18s ease-in-out infinite alternate;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,120,255,0.18),transparent 70%);top:-100px;left:-100px;animation-duration:20s;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,255,0.12),transparent 70%);top:40%;right:-80px;animation-duration:15s;animation-delay:-7s;}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,80,200,0.15),transparent 70%);bottom:10%;left:30%;animation-duration:25s;animation-delay:-12s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}50%{transform:translate(40px,30px) scale(1.1);}100%{transform:translate(-20px,50px) scale(0.95);}}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,140,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,140,255,0.03) 1px,transparent 1px);background-size:60px 60px;}

/* HEADER */
header{position:sticky;top:0;z-index:100;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(3,13,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:1px;background:linear-gradient(135deg,var(--blue-3) 0%,var(--blue-1) 60%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(0,180,255,0.5));}
.search-wrap{position:relative;}
.search-wrap input{background:rgba(7,22,40,0.9);border:1px solid var(--border);color:var(--text);padding:.45rem 1rem .45rem 2.4rem;border-radius:30px;font-family:'Nunito',sans-serif;font-size:.85rem;width:240px;outline:none;transition:all .3s;}
.search-wrap input:focus{border-color:var(--blue-1);box-shadow:0 0 0 3px rgba(0,180,255,.15);width:280px;}
.search-wrap input::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}

/* SYNC STATUS */
.sync-bar{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.6rem;font-size:.78rem;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
.sync-dot.ok{background:var(--green);}
.sync-dot.err{background:var(--red);}
.sync-btn{background:var(--blue-soft);border:1px solid rgba(0,180,255,.15);color:var(--blue-3);padding:2px 10px;border-radius:999px;font-size:.72rem;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.sync-btn:hover{border-color:var(--blue-1);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* HERO */
.hero{position:relative;z-index:1;padding:3.5rem 2.5rem 2.5rem;text-align:center;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.5rem;background:var(--blue-soft);border:1px solid rgba(0,180,255,.2);padding:.3rem 1rem;border-radius:999px;font-size:.78rem;color:var(--blue-3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:1.2rem;font-weight:600;}
.hero-eyebrow::before{content:'';width:6px;height:6px;background:var(--blue-3);border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.4rem,5vw,4.5rem);line-height:1.05;margin-bottom:.8rem;letter-spacing:-1px;}
.line1{color:var(--white);}
.line2{background:linear-gradient(90deg,var(--blue-1),var(--blue-3),var(--blue-1));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.hero p{color:var(--muted);font-size:.95rem;max-width:480px;margin:0 auto 1.8rem;font-weight:300;line-height:1.7;}
.hero-stats{display:flex;justify-content:center;gap:3rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--blue-3);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

/* FILTERS */
.filters-bar{position:relative;z-index:1;padding:.8rem 2.5rem 1.5rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.chip{background:rgba(7,22,40,.8);border:1px solid var(--border);color:var(--muted);padding:.42rem 1.2rem;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.chip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue-1),var(--blue-2));opacity:0;transition:opacity .25s;}
.chip span{position:relative;z-index:1;}
.chip:hover{border-color:var(--blue-1);color:var(--white);}
.chip:hover::before{opacity:.15;}
.chip.active{border-color:var(--blue-1);color:var(--white);box-shadow:0 0 16px rgba(0,180,255,.3),inset 0 0 20px rgba(0,180,255,.1);}
.chip.active::before{opacity:.2;}

/* SEC HEAD */
.sec-head{position:relative;z-index:1;padding:0 2.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.sec-head h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:.6rem;}
.sec-head h2::before{content:'';display:block;width:4px;height:18px;background:linear-gradient(180deg,var(--blue-3),var(--blue-2));border-radius:2px;}
.count-badge{background:var(--blue-soft);border:1px solid rgba(0,180,255,.2);color:var(--blue-3);font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:999px;}

/* GRID */
.content-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:1.4rem;padding:0 2.5rem 6rem;}

/* 3D CARD */
.movie-card{perspective:900px;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.card-inner{position:relative;border-radius:14px;overflow:hidden;background:var(--card-bg);border:1px solid var(--border);transform-style:preserve-3d;transition:transform .4s cubic-bezier(.25,.46,.45,.94),box-shadow .4s;will-change:transform;}
.movie-card:hover .card-inner{transform:rotateY(-6deg) rotateX(4deg) scale(1.04) translateZ(10px);box-shadow:8px 20px 50px rgba(0,0,0,.7),0 0 0 1px rgba(0,180,255,.4),0 0 40px rgba(0,140,255,.2),-4px -4px 20px rgba(56,217,255,.1);}
.card-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%,rgba(0,180,255,.04) 100%);opacity:0;transition:opacity .4s;z-index:3;pointer-events:none;border-radius:14px;}
.movie-card:hover .card-inner::after{opacity:1;}
.thumb{aspect-ratio:2/3;overflow:hidden;position:relative;}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block;}
.movie-card:hover .thumb img{transform:scale(1.08);}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,13,26,.9) 0%,rgba(3,13,26,.3) 40%,transparent 70%);z-index:1;}
.dl-overlay{position:absolute;inset:0;background:rgba(0,20,50,.65);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .3s;}
.movie-card:hover .dl-overlay{opacity:1;}
.dl-pill{background:linear-gradient(135deg,var(--blue-1),var(--blue-2));color:#fff;padding:.55rem 1.3rem;border-radius:999px;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 20px rgba(0,120,255,.5),0 0 40px rgba(0,180,255,.3);transform:translateY(6px);transition:transform .3s;}
.movie-card:hover .dl-pill{transform:translateY(0);}
.badge-q{position:absolute;top:9px;left:9px;z-index:4;background:linear-gradient(135deg,var(--blue-1),var(--blue-2));color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px;box-shadow:0 2px 10px rgba(0,100,255,.4);}
.badge-r{position:absolute;top:9px;right:9px;z-index:4;background:rgba(3,13,26,.75);backdrop-filter:blur(6px);border:1px solid rgba(0,180,255,.2);color:var(--gold);font-size:.72rem;font-weight:600;padding:2px 7px;border-radius:5px;display:flex;align-items:center;gap:3px;}
.card-body{padding:.75rem .9rem .9rem;position:relative;z-index:2;}
.card-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);margin-bottom:.35rem;}
.card-sub{display:flex;gap:.5rem;align-items:center;font-size:.72rem;color:var(--muted);}
.card-sub .dot{width:3px;height:3px;background:var(--muted);border-radius:50%;}
.card-genre{background:rgba(0,180,255,.07);border:1px solid rgba(0,180,255,.12);color:var(--blue-3);padding:1px 7px;border-radius:3px;font-size:.68rem;font-weight:600;}

/* LOADING / EMPTY */
.loader{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}
.loader-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--blue-1);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.2rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty-icon{font-size:3.5rem;margin-bottom:1rem;}

/* FAB */
.fab{position:fixed;bottom:2rem;right:2rem;z-index:200;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--blue-1),var(--blue-2));border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 24px rgba(0,140,255,.5),0 0 40px rgba(0,180,255,.2);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;}
.fab:hover{transform:scale(1.1) rotate(45deg);box-shadow:0 6px 32px rgba(0,140,255,.7);}
.fab.open{transform:rotate(45deg);}

/* PANEL */
.panel{position:fixed;bottom:7rem;right:2rem;z-index:200;width:340px;background:rgba(7,22,40,.97);border:1px solid rgba(0,180,255,.2);border-radius:16px;padding:1.6rem;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px rgba(0,100,255,.1);display:none;flex-direction:column;gap:.85rem;}
.panel.open{display:flex;}
.panel-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--blue-3),var(--blue-1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.2rem;}
.panel-note{font-size:.75rem;color:var(--green);background:rgba(6,214,160,.06);border:1px solid rgba(6,214,160,.15);padding:.5rem .8rem;border-radius:8px;line-height:1.5;}
.field{display:flex;flex-direction:column;gap:.3rem;}
.field label{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.field input,.field select{background:rgba(3,13,26,.8);border:1px solid var(--border);color:var(--text);padding:.5rem .85rem;border-radius:8px;font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field select:focus{border-color:var(--blue-1);box-shadow:0 0 0 3px rgba(0,180,255,.1);}
.field select option{background:#071628;}
.submit-btn{background:linear-gradient(135deg,var(--blue-1) 0%,var(--blue-2) 100%);color:#fff;border:none;padding:.7rem;border-radius:9px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;letter-spacing:.5px;margin-top:.2rem;transition:opacity .2s,transform .2s;box-shadow:0 4px 20px rgba(0,120,255,.35);}
.submit-btn:hover{opacity:.9;transform:translateY(-1px);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(0,120,255,.3);border-radius:3px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card-animate{animation:fadeUp .5s ease both;}

.menu-btn{font-size:26px;cursor:pointer;color:white;}
.side-menu{position:fixed;left:-300px;top:0;width:280px;height:100%;background:#071628;z-index:999;padding:20px;overflow-y:auto;transition:.3s;}
.side-menu.open{left:0;}
.side-menu h3{margin-bottom:10px;color:#38d9ff;}
.side-menu a{display:block;padding:8px;color:white;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.1);}

@media(max-width:768px){
header{padding:0 12px;}
.search-wrap input{width:140px;}
.hero{padding:20px 10px;}
.content-grid{grid-template-columns:repeat(2,1fr);padding:10px;gap:10px;}
.card-title{font-size:.8rem;}
}
@media(min-width:769px){
.content-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
}


.menu-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
z-index:998;
display:none;
}
.menu-overlay.show{display:block;}


.close-menu{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
float:right;
margin-bottom:10px;
}
.side-menu{
transition:left .35s ease;
}

</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-lines"></div>

<!-- HEADER -->
<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo">🎬 MOVIEBD</div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Movie, Series খুঁজুন..." oninput="renderGrid()">
  </div>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<div class="side-menu" id="sideMenu"><button class="close-menu" onclick="toggleMenu()">✕</button>
   <h3>Categories</h3>
   <div id="menuCategories"></div>

   <h3 style="margin-top:20px;">Contents</h3>
   <div id="menuContents"></div>
</div>

<!-- SYNC BAR -->
<div class="sync-bar">
  <div class="sync-dot loading" id="syncDot"></div>
  <span id="syncText">The Best site for Movies & webseries</span>
  <button class="sync-btn" onclick="loadFromSheets()">🔄 Refresh</button>
</div>

<!-- HERO -->
<section class="hero">
  
  <h1>
    <div class="line1">সেরা Movies &</div>
    <div class="line2">Series Download করুন</div>
  </h1>
  
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">—</div>
      <div class="stat-lbl">Content</div>
    </div>
    <div class="stat">
      <div class="stat-num">4K</div>
      <div class="stat-lbl">Quality</div>
    </div>
    <div class="stat">
      <div class="stat-num">Free</div>
      <div class="stat-lbl">Download</div>
    </div>
  </div>
</section>

<!-- FILTERS -->
<div class="filters-bar">
  <button class="chip active" onclick="setFilter('all',this)"><span>🎬 সব</span></button>
  <button class="chip" onclick="setFilter('movie',this)"><span>🎥 Movie</span></button>
  <button class="chip" onclick="setFilter('series',this)"><span>📺 Series</span></button>
  <button class="chip" onclick="setFilter('bangla',this)"><span>🇧🇩 বাংলা</span></button>
  <button class="chip" onclick="setFilter('hindi',this)"><span>🇮🇳 হিন্দি</span></button>
  <button class="chip" onclick="setFilter('english',this)"><span>🌐 English</span></button>
  <button class="chip" onclick="setFilter('4k',this)"><span>✨ 4K</span></button>
</div>

<div class="sec-head">
  <h2>সব Content</h2>
  <span class="count-badge" id="countBadge">— টি</span>
</div>

<div class="content-grid" id="contentGrid">
  <div class="loader">
    <div class="loader-ring"></div>
    <p>Loading...</p>
  </div>
</div>



<script>
// ══ CONFIG ══
const SHEET_ID = '11tVUwkMeb12rTTkMUJ9a05yJ84ISFIg8mLFZ5ekizK4';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

let allContents = [];
let activeFilter = 'all';

// ══ LOAD FROM SHEETS ══
async function loadFromSheets() {
  setSyncStatus('loading', 'Google Sheets থেকে data load হচ্ছে...');
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();

    // Strip Google's JSONP wrapper
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label.toLowerCase().trim());

    allContents = rows
      .filter(r => r.c && r.c[0] && r.c[0].v)
      .map((r, i) => {
        const get = (key) => {
          const idx = cols.indexOf(key);
          return idx >= 0 && r.c[idx] ? String(r.c[idx].v).trim() : '';
        };
        return {
          id: i,
          title:    get('title'),
          thumb:    get('thumb'),
          drive:    get('drive'),
          year:     get('year'),
          genre:    get('genre'),
          category: get('category').toLowerCase(),
          quality:  get('quality'),
          rating:   get('rating'),
        };
      });

    setSyncStatus('ok', 'Ready');
    document.getElementById('totalCount').textContent = allContents.length;
    renderGrid();

  } catch (err) {
    setSyncStatus('err', 'Load failed — Sheet কি Public করা আছে?');
    document.getElementById('contentGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <p style="color:#ef233c;margin-bottom:.5rem">Data load হয়নি</p>
        <p style="font-size:.8rem">Sheet → Share → "Anyone with the link" → Viewer করুন</p>
      </div>`;
  }
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + state;
  document.getElementById('syncText').textContent = msg;
}

// ══ FILTER & RENDER ══
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('contentGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();

  const filtered = allContents.filter(c => {
    const matchF = activeFilter === 'all'
      || c.category === activeFilter
      || (activeFilter === '4k' && c.quality === '4K');
    const matchS = !q
      || c.title.toLowerCase().includes(q)
      || (c.genre && c.genre.toLowerCase().includes(q));
    return matchF && matchS;
  });

  document.getElementById('countBadge').textContent = filtered.length + ' টি';

document.getElementById("menuContents").innerHTML =
filtered.map(c => `<a href="${c.drive}" target="_blank">${c.title}</a>`).join('');

const cats=[...new Set(allContents.map(c=>c.category))];
document.getElementById("menuCategories").innerHTML =
cats.map(c => `<a href="#" onclick="activeFilter='${c}';renderGrid()">${c}</a>`).join('');

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><p>কোনো content পাওয়া যায়নি</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((c, i) => `
    <a class="movie-card card-animate" href="${c.drive}" target="_blank" rel="noopener"
       style="animation-delay:${i * 0.05}s">
      <div class="card-inner">
        <div class="thumb">
          <img src="${c.thumb || ''}" alt="${c.title}" loading="lazy"
            onerror="this.src='https://placehold.co/200x300/071628/38d9ff?text=${encodeURIComponent(c.title)}'">
          <div class="thumb-overlay"></div>
          ${c.quality ? `<span class="badge-q">${c.quality}</span>` : ''}
          ${c.rating  ? `<span class="badge-r">⭐ ${c.rating}</span>` : ''}
          <div class="dl-overlay">
            <div class="dl-pill">⬇ Download</div>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${c.title}</div>
          <div class="card-sub">
            ${c.year  ? `<span>${c.year}</span>` : ''}
            ${c.year && c.genre ? `<span class="dot"></span>` : ''}
            ${c.genre ? `<span class="card-genre">${c.genre}</span>` : ''}
          </div>
        </div>
      </div>
    </a>
  `).join('');
}

// ══ PANEL ══
function togglePanel() {
  const p = document.getElementById('panel');
  const fab = document.getElementById('fab');
  p.classList.toggle('open');
  fab.classList.toggle('open');
}

function copyRowData() {
  const vals = [
    document.getElementById('f_title').value,
    document.getElementById('f_thumb').value,
    document.getElementById('f_drive').value,
    document.getElementById('f_year').value,
    document.getElementById('f_genre').value,
    document.getElementById('f_cat').value,
    document.getElementById('f_quality').value,
    document.getElementById('f_rating').value,
  ];
  if (!vals[0] || !vals[2]) { alert('Title এবং Drive Link দিন।'); return; }
  navigator.clipboard.writeText(vals.join('\t'))
    .then(() => alert('✅ Copied! এখন Google Sheet-এ paste করুন (Ctrl+V), তারপর Refresh চাপুন।'))
    .catch(() => alert('Copy হয়নি — manually Sheet-এ type করুন।'));
}


function toggleMenu(){
 document.getElementById("sideMenu").classList.toggle("open");
 document.getElementById("menuOverlay").classList.toggle("show");
}


document.getElementById("menuContents").innerHTML =
allContents.map(c => `<a href="${c.drive}" target="_blank">${c.title}</a>`).join('');

// ══ INIT ══
loadFromSheets();
</script>
